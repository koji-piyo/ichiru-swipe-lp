<script>
document.addEventListener('DOMContentLoaded', () => {
  const slides = Array.from(document.querySelectorAll('.slide'));
  const seg = document.getElementById('storyProgress');
  const counter = document.getElementById('storyCounter');
  const bar = document.getElementById('storyBar');
  const hintEl = document.getElementById('storyHint');
  let current = 0, moved = false;

  slides.forEach(() => seg.appendChild(document.createElement('i')));
  const segs = seg.querySelectorAll('i');

  const imgs = slides.map((s) => s.querySelector('.story-img')?.getAttribute('src')).filter(Boolean);
  const prefetched = new Set();
  const prefetch = (i) => {
    [i + 1, i + 2].forEach((j) => {
      if (imgs[j] && !prefetched.has(j)) { prefetched.add(j); const im = new Image(); im.src = imgs[j]; }
    });
  };

  const update = (i) => {
    if (i !== current) { moved = true; hintEl?.classList.add('hide'); try { navigator.vibrate && navigator.vibrate(6); } catch (_) {} }
    current = i;
    segs.forEach((el, j) => el.classList.toggle('done', j <= i));
    counter.textContent = (i + 1) + ' / ' + slides.length;
    const s = slides[i];
    const hideBar = i < 1 || s.dataset.hideStoryBar === 'true' || s.classList.contains('s-cta');
    bar.classList.toggle('show', !hideBar);
    prefetch(i);
  };

  const io = new IntersectionObserver((entries) => {
    entries.forEach((e) => {
      if (e.isIntersecting && e.intersectionRatio > 0.6) update(slides.indexOf(e.target));
    });
  }, { threshold: [0.6] });
  slides.forEach((s) => io.observe(s));
  update(0);

  const go = (dir) => {
    const next = Math.min(Math.max(current + dir, 0), slides.length - 1);
    if (next !== current) slides[next].scrollIntoView({ behavior: 'smooth' });
  };

  document.addEventListener('click', (e) => {
    if (e.target.closest('a, button, .story-bar')) return;
    if (!e.target.closest('.story-slide')) return;
    go(e.clientX / window.innerWidth < 0.25 ? -1 : 1);
  });

  document.addEventListener('keydown', (e) => {
    if (['ArrowDown', 'PageDown', ' '].includes(e.key)) { e.preventDefault(); go(1); }
    if (['ArrowUp', 'PageUp'].includes(e.key)) { e.preventDefault(); go(-1); }
  });

  setTimeout(() => { if (!moved) hintEl?.classList.remove('hide'); }, 600);
});
</script>
